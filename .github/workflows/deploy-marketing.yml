name: Deploy Marketing

# Publishes the static marketing site (marketing/) to its Azure Static Web App.
# The SWA is created by infra (deployMarketing=true); grab its deployment token
# from the portal or `az staticwebapp secrets list` and store it as the repo
# secret MARKETING_SWA_TOKEN. Independent of the API/Functions deploys.
on:
  push:
    branches: [ main ]
    paths:
      - 'marketing/**'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.MARKETING_SWA_TOKEN }}
          action: upload
          # Plain static HTML — nothing to build, just upload the folder as-is.
          app_location: marketing
          output_location: ''
          skip_app_build: true
          skip_api_build: true
