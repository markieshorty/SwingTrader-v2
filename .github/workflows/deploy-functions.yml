name: Deploy Functions

on:
  push:
    branches: [ main ]
    paths:
      - 'SwingTrader.Functions/**'
      - 'SwingTrader.Core/**'
      - 'SwingTrader.Data/**'
      - 'SwingTrader.Agents/**'
      - 'SwingTrader.Infrastructure/**'
      - 'SwingTrader.Tests/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Skip the busy-queue wait and deploy immediately'
        required: false
        default: 'false'

# One deploy at a time: duplicate webhook deliveries (GitHub re-sent a push
# twice on 20 Jul 2026) raced each other into ContainerAppOperationInProgress.
# Queued, never cancelled - a deploy that started should finish.
concurrency:
  group: deploy-functions
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet test SwingTrader.sln --configuration Release

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Functions
        run: |
          dotnet publish SwingTrader.Functions \
            --configuration Release \
            --output ./functions-output \
            --runtime linux-x64 \
            --self-contained false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploys abandon in-flight Service Bus locks (Flex Consumption gives no
      # long drain), so a push mid-watchlist/backtest/research used to kill the
      # run. Hold the deploy until the long-running job queues are quiet - up
      # to 30 minutes, then proceed anyway (MaxDeliveryCount 10 is the
      # backstop). workflow_dispatch runs can skip via force_deploy.
      - name: Wait for long-running jobs to finish
        if: ${{ github.event.inputs.force_deploy != 'true' }}
        run: |
          NAMESPACE="swingtrader-sb-prod"
          QUEUES="watchlist-jobs backtest-jobs research-jobs refinement-jobs candlesync-jobs"
          for i in $(seq 1 30); do
            busy=0
            for q in $QUEUES; do
              n=$(az servicebus queue show                 --resource-group ${{ secrets.RESOURCE_GROUP }}                 --namespace-name $NAMESPACE --name $q                 --query countDetails.activeMessageCount -o tsv)
              busy=$((busy + n))
            done
            if [ "$busy" -eq 0 ]; then
              echo "Job queues quiet - deploying."
              exit 0
            fi
            echo "Attempt $i/30: $busy active job message(s) in flight - waiting 60s..."
            sleep 60
          done
          echo "::warning::Job queues still busy after 30 minutes - deploying anyway (MaxDeliveryCount=10 absorbs the churn)."

      - name: Deploy to Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.FUNCTION_APP_NAME }}
          package: ./functions-output
          scm-do-build-during-deployment: false

      - name: Verify
        run: |
          state=$(az functionapp show \
            --name ${{ secrets.FUNCTION_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query state -o tsv)
          echo "Function App state: $state"
