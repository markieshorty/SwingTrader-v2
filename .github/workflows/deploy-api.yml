name: Deploy API

on:
  push:
    branches: [ main ]
    paths:
      - 'SwingTrader.Api/**'
      - 'SwingTrader.Core/**'
      - 'SwingTrader.Data/**'
      - 'SwingTrader.Agents/**'
      - 'SwingTrader.Infrastructure/**'
      - 'SwingTrader.Angular/**'
      - 'SwingTrader.Tests/**'
  workflow_dispatch:

# One deploy at a time: duplicate webhook deliveries (GitHub re-sent a push
# twice on 20 Jul 2026) raced each other into ContainerAppOperationInProgress.
# Queued, never cancelled - a deploy that started should finish.
concurrency:
  group: deploy-api
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: swingtrader-api

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet test SwingTrader.sln --configuration Release

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SwingTrader.Angular/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Angular dependencies
        run: npm ci
        working-directory: SwingTrader.Angular

      - name: Run Angular tests
        run: npm test
        working-directory: SwingTrader.Angular

      - name: Replace Angular environment tokens
        run: |
          sed -i "s|#{B2C_CLIENT_ID}#|${{ secrets.B2C_CLIENT_ID }}|g" SwingTrader.Angular/src/environments/environment.prod.ts
          sed -i "s|#{B2C_AUTHORITY}#|${{ secrets.B2C_AUTHORITY }}|g" SwingTrader.Angular/src/environments/environment.prod.ts
          sed -i "s|#{B2C_DOMAIN}#|${{ secrets.B2C_DOMAIN }}|g" SwingTrader.Angular/src/environments/environment.prod.ts
          sed -i "s|#{B2C_TENANT_ID}#|${{ secrets.B2C_TENANT_ID }}|g" SwingTrader.Angular/src/environments/environment.prod.ts
          sed -i "s|#{B2C_SCOPE}#|${{ secrets.B2C_SCOPE }}|g" SwingTrader.Angular/src/environments/environment.prod.ts
        # Safe to run before Phase 10c sets the B2C secrets: unset secrets
        # substitute to an empty string rather than failing the step.

      - name: Build Angular
        run: npm run build
        working-directory: SwingTrader.Angular
        # Output goes to SwingTrader.Api/wwwroot, picked up by the Docker
        # build below via its `COPY . .` step.

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Build on the (free) GitHub runner and push, instead of `az acr build`:
      # ACR Tasks billed ~9 GBP/month of "Task vCPU Duration" for compute the
      # runner already provides (found 20 Jul 2026 in the cost breakdown).
      - name: Build and push to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker build \
            --file SwingTrader.Api/Dockerfile \
            --tag ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Register ACR credentials on Container App
        run: |
          az containerapp registry set \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --server ${{ secrets.ACR_NAME }}.azurecr.io \
            --identity system
        # Bicep intentionally omits the registries[] block on first deploy —
        # configuring it there caused revision provisioning to hang
        # (Operation expired) since the ACR-pull role assignment isn't
        # guaranteed to exist yet at that point. Registered here instead,
        # once the role assignment has definitely propagated.

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify deployment
        run: |
          # Scale-to-zero (minReplicas: 0) has a known cutover gap: az containerapp
          # update can finish, mark the new revision active/100% traffic, and yet
          # leave it at 0 replicas indefinitely while the previous revision keeps
          # quietly serving stale traffic - hitting the main app URL alone doesn't
          # reliably force the new revision to cold-start. Hitting the revision's
          # own dedicated FQDN does force it, so that's the real health check here.
          LATEST_REVISION=$(az containerapp revision list \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query "sort_by([?properties.active], &properties.createdTime)[-1].name" \
            -o tsv)
          echo "Latest revision: $LATEST_REVISION"

          REVISION_FQDN=$(az containerapp revision show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --revision "$LATEST_REVISION" \
            --query properties.fqdn \
            -o tsv)
          echo "Revision FQDN: $REVISION_FQDN"

          ready=false
          for attempt in $(seq 1 12); do
            response=$(curl -s -o /dev/null -w "%{http_code}" "https://${REVISION_FQDN}/health/ready" || echo "000")
            echo "Attempt $attempt: HTTP $response"
            if [ "$response" == "200" ]; then
              ready=true
              break
            fi
            sleep 10
          done

          if [ "$ready" != "true" ]; then
            echo "Revision $LATEST_REVISION never became healthy - failing deploy."
            exit 1
          fi

          # Deactivate any other active revision so nothing stale keeps serving
          # traffic alongside the new one (the cutover gap this whole step exists
          # to catch).
          az containerapp revision list \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query "[?properties.active && name!='$LATEST_REVISION'].name" \
            -o tsv | while read -r old_revision; do
              echo "Deactivating stale revision: $old_revision"
              # Tolerate RevisionAlreadyInRequestedState: a crash-looped
              # revision gets auto-deactivated by the platform between our
              # 'active' listing and this call, and that race must not fail
              # a deploy whose new revision already passed the health check.
              az containerapp revision deactivate \
                --name ${{ secrets.CONTAINER_APP_NAME }} \
                --resource-group ${{ secrets.RESOURCE_GROUP }} \
                --revision "$old_revision" \
                || echo "Revision $old_revision was already inactive - fine."
            done

          APP_URL=$(az containerapp show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://${APP_URL}/health/ready")
          if [ "$response" != "200" ]; then
            echo "Main app URL health check failed: $response"
            exit 1
          fi
          echo "Deployed successfully: https://$APP_URL"
