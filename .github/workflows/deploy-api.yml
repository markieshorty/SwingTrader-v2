name: Deploy API

on:
  push:
    branches: [ main ]
    paths:
      - 'SwingTrader.Api/**'
      - 'SwingTrader.Core/**'
      - 'SwingTrader.Data/**'
      - 'SwingTrader.Agents/**'
      - 'SwingTrader.Infrastructure/**'
      - 'SwingTrader.Angular/**'
      - 'SwingTrader.Tests/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: swingtrader-api

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet test SwingTrader.sln --configuration Release

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SwingTrader.Angular/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Angular dependencies
        run: npm ci
        working-directory: SwingTrader.Angular

      - name: Run Angular tests
        run: npm test
        working-directory: SwingTrader.Angular

      - name: Replace Angular environment tokens
        run: |
          sed -i "s|#{B2C_CLIENT_ID}#|${{ secrets.B2C_CLIENT_ID }}|g" SwingTrader.Angular/src/environments/environment.prod.ts
          sed -i "s|#{B2C_AUTHORITY}#|${{ secrets.B2C_AUTHORITY }}|g" SwingTrader.Angular/src/environments/environment.prod.ts
          sed -i "s|#{B2C_DOMAIN}#|${{ secrets.B2C_DOMAIN }}|g" SwingTrader.Angular/src/environments/environment.prod.ts
          sed -i "s|#{B2C_TENANT_ID}#|${{ secrets.B2C_TENANT_ID }}|g" SwingTrader.Angular/src/environments/environment.prod.ts
          sed -i "s|#{B2C_SCOPE}#|${{ secrets.B2C_SCOPE }}|g" SwingTrader.Angular/src/environments/environment.prod.ts
        # Safe to run before Phase 10c sets the B2C secrets: unset secrets
        # substitute to an empty string rather than failing the step.

      - name: Build Angular
        run: npm run build
        working-directory: SwingTrader.Angular
        # Output goes to SwingTrader.Api/wwwroot, picked up by the Docker
        # build below via its `COPY . .` step.

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file SwingTrader.Api/Dockerfile \
            .

      - name: Register ACR credentials on Container App
        run: |
          az containerapp registry set \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --server ${{ secrets.ACR_NAME }}.azurecr.io \
            --identity system
        # Bicep intentionally omits the registries[] block on first deploy —
        # configuring it there caused revision provisioning to hang
        # (Operation expired) since the ACR-pull role assignment isn't
        # guaranteed to exist yet at that point. Registered here instead,
        # once the role assignment has definitely propagated.

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify deployment
        run: |
          sleep 30
          APP_URL=$(az containerapp show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${APP_URL}/health/ready")
          if [ "$response" != "200" ]; then
            echo "Health check failed: $response"
            exit 1
          fi
          echo "Deployed successfully: https://$APP_URL"
