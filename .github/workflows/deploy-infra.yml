name: Deploy Infrastructure

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    name: Deploy Bicep
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep lint
        run: az bicep lint --file infra/main.bicep

      - name: What-if preview
        env:
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          B2C_AUTHORITY: ${{ secrets.B2C_AUTHORITY }}
          B2C_AUDIENCE: ${{ secrets.B2C_AUDIENCE }}
        run: |
          az deployment group what-if \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/prod.bicepparam

      - name: Deploy infrastructure
        id: deploy
        env:
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          B2C_AUTHORITY: ${{ secrets.B2C_AUTHORITY }}
          B2C_AUDIENCE: ${{ secrets.B2C_AUDIENCE }}
        run: |
          output=$(az deployment group create \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/prod.bicepparam \
            --query properties.outputs \
            --output json)

          echo "KEY_VAULT_NAME=$(echo $output | jq -r '.keyVaultName.value')" >> $GITHUB_OUTPUT
          echo "SQL_SERVER_FQDN=$(echo $output | jq -r '.sqlServerFqdn.value')" >> $GITHUB_OUTPUT
          echo "SQL_DATABASE_NAME=$(echo $output | jq -r '.sqlDatabaseName.value')" >> $GITHUB_OUTPUT
          echo "CONTAINER_APP_FQDN=$(echo $output | jq -r '.containerAppFqdn.value')" >> $GITHUB_OUTPUT

      - name: Build SQL connection string
        id: sqlconn
        env:
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          CONN="Server=tcp:${{ steps.deploy.outputs.SQL_SERVER_FQDN }},1433;Initial Catalog=${{ steps.deploy.outputs.SQL_DATABASE_NAME }};User ID=sqladmin;Password=${SQL_ADMIN_PASSWORD};Authentication=SqlPassword;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
          echo "::add-mask::$CONN"
          echo "SQL_CONN=$CONN" >> "$GITHUB_OUTPUT"
        # Built here (not as a Bicep output) so the admin password never
        # transits Azure deployment history/outputs at all.

      - name: Populate Key Vault secrets
        run: |
          set_secret_if_missing() {
            local name=$1 value=$2
            if [ -z "$value" ]; then
              echo "Skipping (no value provided): $name"
              return
            fi
            if ! az keyvault secret show \
              --vault-name ${{ steps.deploy.outputs.KEY_VAULT_NAME }} \
              --name "$name" --query "id" -o tsv 2>/dev/null; then
              az keyvault secret set \
                --vault-name ${{ steps.deploy.outputs.KEY_VAULT_NAME }} \
                --name "$name" --value "$value"
              echo "Created: $name"
            else
              echo "Exists, skipping: $name"
            fi
          }

          set_secret_if_missing "Finnhub--ApiKey" "${{ secrets.FINNHUB_API_KEY }}"
          set_secret_if_missing "Tiingo--ApiKey" "${{ secrets.TIINGO_API_KEY }}"
          set_secret_if_missing "Trading212--ApiKey" "${{ secrets.T212_API_KEY }}"
          set_secret_if_missing "Trading212--ApiSecret" "${{ secrets.T212_API_SECRET }}"
          set_secret_if_missing "Claude--ApiKey" "${{ secrets.CLAUDE_API_KEY }}"
          set_secret_if_missing "Email--Username" "${{ secrets.EMAIL_USERNAME }}"
          set_secret_if_missing "Email--Password" "${{ secrets.EMAIL_PASSWORD }}"
          # EmailConfig.SmtpHost defaults to empty, which makes EmailService
          # silently no-op (by design) rather than fail loudly - confirmed as
          # the actual reason manual "Send Report" produced no email, since
          # neither of these were ever set anywhere (not Key Vault, not
          # appsettings, not Bicep). Gmail per the account owner; FromAddress
          # reuses the same address rather than needing its own secret.
          set_secret_if_missing "Email--SmtpHost" "smtp.gmail.com"
          set_secret_if_missing "Email--FromAddress" "${{ secrets.EMAIL_USERNAME }}"
          set_secret_if_missing "Email--ToAddresses--0" "${{ secrets.EMAIL_TO_0 }}"
          set_secret_if_missing "Email--ToAddresses--1" "${{ secrets.EMAIL_TO_1 }}"
          set_secret_if_missing "Admin--UserId" "${{ secrets.ADMIN_USER_ID }}"

          # Always overwritten, unlike the secrets above: this value is fully
          # computed by this workflow (server FQDN + db name + admin
          # password), never manually set, so there's nothing to preserve.
          az keyvault secret set \
            --vault-name ${{ steps.deploy.outputs.KEY_VAULT_NAME }} \
            --name "ConnectionStrings--DefaultConnection" \
            --value "${{ steps.sqlconn.outputs.SQL_CONN }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run EF migrations
        run: |
          dotnet restore SwingTrader.sln
          dotnet tool install --global dotnet-ef
          dotnet ef database update \
            --project SwingTrader.Data \
            --startup-project SwingTrader.Api \
            --connection "${{ steps.sqlconn.outputs.SQL_CONN }}"

      - name: Restore real API image if one exists in ACR
        run: |
          # Bicep always declares the bootstrap placeholder image (it can't
          # know about images pushed later by deploy-api.yml), so re-applying
          # this template resets a live Container App back to the placeholder
          # every time. Re-point at the latest real image immediately after,
          # if deploy-api.yml has ever pushed one.
          if az acr repository show \
            --name ${{ secrets.ACR_NAME }} \
            --repository swingtrader-api > /dev/null 2>&1; then
            az containerapp registry set \
              --name ${{ secrets.CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --server ${{ secrets.ACR_NAME }}.azurecr.io \
              --identity system
            az containerapp update \
              --name ${{ secrets.CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --image ${{ secrets.ACR_NAME }}.azurecr.io/swingtrader-api:latest
            echo "Restored real API image from ACR"
          else
            echo "No image pushed to ACR yet - leaving bootstrap placeholder"
          fi

      - name: Output deployment info
        run: |
          echo "Container App URL: https://${{ steps.deploy.outputs.CONTAINER_APP_FQDN }}"
          echo "Add to UptimeRobot: https://${{ steps.deploy.outputs.CONTAINER_APP_FQDN }}/health"
